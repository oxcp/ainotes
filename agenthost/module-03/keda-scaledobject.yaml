# keda-scaledobject.yaml — Module 3: KEDA ScaledObject for the agent on AKS
# Scales the agent-host deployment to zero after 30 min of inactivity
# (no messages in the request queue). Scales up on incoming queue messages.
#
# This example uses an HTTP-based KEDA scaler via the KEDA HTTP Add-on.
# Alternatively, replace with an Azure Service Bus or Redis list scaler
# to match your actual request queue mechanism.

---
# HTTP ScaledObject via keda-add-ons-http (install separately)
# https://github.com/kedacore/http-add-on
apiVersion: http.keda.sh/v1alpha1
kind: HTTPScaledObject
metadata:
  name: agent-host-http-scaler
  namespace: <NAMESPACE>
spec:
  hosts:
    - agent-host.<NAMESPACE>.svc.cluster.local
  targetPendingRequests: 10
  scaledownPeriod: 1800   # 30 minutes idle → scale to zero
  scaleTargetRef:
    name: agent-host
    kind: Deployment
    apiVersion: apps/v1
    service: agent-host
    port: 80
  replicas:
    min: 0
    max: 10

---
# Alternative: Redis List-based ScaledObject (if using a Redis queue for requests)
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: agent-host-redis-scaler
  namespace: <NAMESPACE>
spec:
  scaleTargetRef:
    name: agent-host
  minReplicaCount: 0
  maxReplicaCount: 10
  cooldownPeriod: 1800   # 30 minutes
  pollingInterval: 15
  triggers:
    - type: redis
      metadata:
        address: <REDIS_HOST>:6380
        listName: agent:request-queue
        listLength: "5"
        enableTLS: "true"
      authenticationRef:
        name: agent-redis-trigger-auth

---
# TriggerAuthentication for Redis (references the Kubernetes secret)
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: agent-redis-trigger-auth
  namespace: <NAMESPACE>
spec:
  secretTargetRef:
    - parameter: password
      name: agent-redis
      key: connection-string

# container-app.yaml — Module 3: ACA Container App manifest (YAML alternative)
# Deploy with: az containerapp create --resource-group <rg> --environment <env> --yaml container-app.yaml

name: agent-host
type: Microsoft.App/containerApps
location: eastus
identity:
  type: UserAssigned
  userAssignedIdentities:
    /subscriptions/<subscriptionId>/resourceGroups/rg-agenthost-workshop/providers/Microsoft.ManagedIdentity/userAssignedIdentities/id-agenthost: {}
properties:
  environmentId: /subscriptions/<subscriptionId>/resourceGroups/rg-agenthost-workshop/providers/Microsoft.App/managedEnvironments/aca-env-agenthost
  workloadProfileName: sandbox
  configuration:
    ingress:
      external: true
      targetPort: 8080
      transport: http
      allowInsecure: false
    registries:
      - server: acragenthost.azurecr.io
        identity: /subscriptions/<subscriptionId>/resourceGroups/rg-agenthost-workshop/providers/Microsoft.ManagedIdentity/userAssignedIdentities/id-agenthost
    secrets:
      - name: redis-conn
        # Reference Key Vault secret for Redis connection string
        keyVaultUrl: https://kv-agenthost.vault.azure.net/secrets/redis-connection-string
        identity: /subscriptions/<subscriptionId>/resourceGroups/rg-agenthost-workshop/providers/Microsoft.ManagedIdentity/userAssignedIdentities/id-agenthost
  template:
    containers:
      - name: agent-host
        image: acragenthost.azurecr.io/agent-host:latest
        resources:
          cpu: 1.0
          memory: 2Gi
        env:
          - name: AGENT_STATE_BACKEND
            value: redis
          - name: AGENT_REDIS_CONNECTION
            secretRef: redis-conn
          - name: AGENT_BLOB_CONTAINER
            value: agent-state
          - name: AGENT_STORAGE_ACCOUNT
            value: stcagenthost
          - name: AGENT_APIM_ENDPOINT
            value: https://apim-agenthost.azure-api.net
          - name: AZURE_CLIENT_ID
            value: <identityClientId>
        probes:
          - type: Liveness
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
    scale:
      minReplicas: 0
      maxReplicas: 10
      rules:
        - name: http-scaling
          http:
            metadata:
              concurrentRequests: "10"
    terminationGracePeriodSeconds: 60

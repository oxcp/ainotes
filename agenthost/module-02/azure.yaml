# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

# NOTE: module-01 already provisioned the Foundry account, the `maf-agent-prj`
# project, the `gpt-5.4-mini` deployment, and the APIM AI gateway. This file only
# deploys the hosted agent against that existing project. The `ai-project` block
# below re-declares the SAME project/model so `azd` reconciles to module-01's
# resources (idempotent) rather than creating new ones — keep the model name and
# version identical to module-01.
#
# The agent supports TWO model-routing modes, selected by the MODEL_ROUTING env
# var (see agent-src/main.py):
#   - "gateway" (default): route model calls THROUGH the module-01 APIM AI gateway.
#   - "direct": call the Foundry project endpoint directly.

requiredVersions:
  extensions:
    azure.ai.agents: '>=1.0.0-beta.4'

name: maf-agent

services:
  ai-project:
    host: azure.ai.project
    deployments:
      - name: gpt-5.4-mini
        model:
          format: OpenAI
          name: gpt-5.4-mini
          version: '2026-03-17'
        sku:
          name: GlobalStandard
          capacity: 50

  maf-agent:
    host: azure.ai.agent
    metadata:
      tags:
        - Agent Framework
        - AI Agent Hosting
        - Azure AI AgentServer
        - Responses Protocol
        - Streaming
    project: agent-src
    language: python
    codeConfiguration:
      runtime: python_3_13
      entryPoint: main.py
    uses:
      - ai-project
    kind: hosted
    name: maf-agent
    description: A basic Agent Framework agent hosted by Foundry.
    protocols:
      - protocol: responses
        version: 2.0.0
    environmentVariables:
      - name: MODEL_ROUTING
        value: "direct" # allowed values: "gateway" or "direct"
      - name: AI_MODEL_DEPLOYMENT_NAME
        value: "gpt-5.4-mini"
      - name: APIM_GATEWAY_URL
        value: "https://apim-agenthost-<SN>.azure-api.net/foundry"

    container:
      resources:
        cpu: '0.5'
        memory: 1Gi

infra:
  provider: microsoft.foundry
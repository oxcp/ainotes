# keda-scaledobject.yaml — Module 4: KEDA ScaledObject for OpenClaw on AKS
# Scales the openclaw-agent deployment to zero after 30 min of inactivity
# (no messages in the request queue). Scales up on incoming queue messages.
#
# This example uses an HTTP-based KEDA scaler via the KEDA HTTP Add-on.
# Alternatively, replace with an Azure Service Bus or Redis list scaler
# to match your actual request queue mechanism.

---
# HTTP ScaledObject via keda-add-ons-http (install separately)
# https://github.com/kedacore/http-add-on
apiVersion: http.keda.sh/v1alpha1
kind: HTTPScaledObject
metadata:
  name: openclaw-agent-http-scaler
  namespace: openclaw
spec:
  hosts:
    - openclaw-agent.openclaw.svc.cluster.local
  targetPendingRequests: 10
  scaledownPeriod: 1800   # 30 minutes idle → scale to zero
  scaleTargetRef:
    name: openclaw-agent
    kind: Deployment
    apiVersion: apps/v1
    service: openclaw-agent
    port: 80
  replicas:
    min: 0
    max: 10

---
# Alternative: Redis List-based ScaledObject (if using a Redis queue for requests)
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: openclaw-agent-redis-scaler
  namespace: openclaw
spec:
  scaleTargetRef:
    name: openclaw-agent
  minReplicaCount: 0
  maxReplicaCount: 10
  cooldownPeriod: 1800   # 30 minutes
  pollingInterval: 15
  triggers:
    - type: redis
      metadata:
        address: <REDIS_HOST>:6380
        listName: openclaw:request-queue
        listLength: "5"
        enableTLS: "true"
      authenticationRef:
        name: openclaw-redis-trigger-auth

---
# TriggerAuthentication for Redis (references the Kubernetes secret)
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: openclaw-redis-trigger-auth
  namespace: openclaw
spec:
  secretTargetRef:
    - parameter: password
      name: openclaw-redis
      key: connection-string

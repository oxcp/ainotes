# deployment.template.yaml — Foundry managed compute (managed online deployment)
# Instructor: replace every <PLACEHOLDER> with values validated against the
# deployed Foundry version, region, and available GPU VM core quota.
#
# Apply with:
#   az ml online-deployment create --file configs/deployment.template.yaml \
#     --resource-group "$RESOURCE_GROUP" --workspace-name <FOUNDRY_HUB_PROJECT> --all-traffic
$schema: https://azuremlschemas.azureedge.net/latest/managedOnlineDeployment.schema.json

name: demo
endpoint_name: <ENDPOINT_NAME>

# Catalog model id, e.g. azureml://registries/azureml/models/<model>/versions/<n>
model: <MANAGED_COMPUTE_MODEL_ID>

# GPU VM SKU with confirmed quota in the target region.
instance_type: <GPU_VM_SKU>
instance_count: 1

request_settings:
  request_timeout_ms: 90000

liveness_probe:
  initial_delay: 1000
  period: 10
  timeout: 2
  success_threshold: 1
  failure_threshold: 30

readiness_probe:
  initial_delay: 1000
  period: 10
  timeout: 10
  success_threshold: 1
  failure_threshold: 10

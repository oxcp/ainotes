# job.yaml
name: ray-train-job
containerfile: ./Dockerfile

env_vars:
  AZURE_STORAGE_ACCOUNT: anyscale28120
#compute_config: LLM-2xA100:4
compute_config:
  head_node:
    instance_type: 8CPU-32GB
    resources:
      CPU: 0
      GPU: 0
    flags: {}
  worker_nodes:
    - instance_type: A100
      flags: {}
      min_nodes: 0
      max_nodes: 2
      market_type: SPOT

  enable_cross_zone_scaling: false
  auto_select_worker_config: false

  flags:
    cloud_resource_strategy: availability
    allow-cross-zone-autoscaling: false

  # Kubernetes PodSpec patch（strategic merge patch）
  advanced_instance_config:
    spec:
      serviceAccountName: anyscale-operator
      volumes:
        - name: azure-blob
          persistentVolumeClaim:
            claimName: anyscale-shared-fuse

      containers:
        - name: ray
          volumeMounts:
            - name: azure-blob
              mountPath: /mnt/cloud-storage

working_dir: .
cloud:
entrypoint: python train.py
